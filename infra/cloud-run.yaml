apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: agentarena-backend
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"  # needed for WebSocket keep-alive
    spec:
      containerConcurrency: 100
      timeoutSeconds: 3600  # 1-hour timeout for long WebSocket sessions
      containers:
        - image: gcr.io/PROJECT_ID/agentarena-backend:latest
          ports:
            - name: http1
              containerPort: 8000
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: latest
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: DEBUG
              value: "false"
            - name: COMMENTARY_STYLE
              value: "hype"
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
